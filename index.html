<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Sheet — Monthly Due List</title>
    <meta name="description" content="Monthly insurance policy due list manager with editable spreadsheet view">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=35">
</head>
<body>
    <!-- ── Top Bar ──────────────────────────────────────────────────────── -->
    <header id="topbar">
        <div class="topbar-left">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
                <div class="logo-text">
                    <h1>Online Sheet</h1>
                    <span class="app-version">version 1.4.0</span>
                </div>
            </div>
            <div class="tab-bar">
                <button id="tab-list" class="tab active" data-tab="list">Monthly List</button>
                <button id="tab-master" class="tab" data-tab="master">Master Data</button>
            </div>
        </div>
        <div class="topbar-right">
            <div class="month-controls" id="month-controls">
                <button id="btn-prev-month" class="icon-btn" title="Previous month">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div id="current-month-label" class="month-label">June 2026</div>
                <button id="btn-next-month" class="icon-btn" title="Next month">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
            <div id="master-info" class="master-info hidden">
                <span id="master-count-badge" class="count-badge">0 policies</span>
            </div>
            <button id="btn-generate" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.22-8.56"/><polyline points="21 3 21 9 15 9"/></svg>
                Generate List
            </button>
            <button id="btn-upload" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload Data
            </button>
        </div>
    </header>

    <!-- ── Info Bar ─────────────────────────────────────────────────────── -->
    <div id="infobar">
        <span id="info-count">No list generated</span>
        <span id="info-generated-at"></span>
        <div class="search-wrapper">
            <div class="search-box">
                <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" class="search-input" placeholder="Search..." autocomplete="off" spellcheck="false">
                <button id="search-clear" class="search-clear hidden" title="Clear">&times;</button>
            </div>
        </div>
        <div id="realtime-clock" class="realtime-clock"></div>
    </div>

    <!-- ── Spreadsheet Container ───────────────────────────────────────── -->
    <div id="spreadsheet-wrapper">
        <div id="empty-state" class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
            <h2>No list for this month</h2>
            <p>Upload data sheets first, then click <strong>"Generate List"</strong> to create this month's due list.</p>
        </div>
        <table id="spreadsheet" class="spreadsheet hidden">
            <thead>
                <tr id="header-row"></tr>
            </thead>
            <tbody id="spreadsheet-body"></tbody>
        </table>
    </div>

    <!-- ── Footer ──────────────────────────────────────────────────────── -->
    <footer id="footer">
        <span id="footer-count">0 rows</span>
        <span id="footer-sync" class="sync-indicator"></span>
    </footer>

    <!-- ── Upload Modal ────────────────────────────────────────────────── -->
    <div id="upload-overlay" class="modal-overlay hidden">
        <div class="modal" role="dialog" aria-label="Upload Data">
            <div class="modal-header">
                <h2>Upload Data Sheets</h2>
                <button id="btn-close-upload" class="icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="drop-zone" class="drop-zone">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p>Drag & drop Excel files here</p>
                    <p class="form-hint">or click to browse (.xlsx, .xlsm)</p>
                    <input type="file" id="file-input" multiple accept=".xlsx,.xlsm,.xls,.csv" hidden>
                </div>
                <div id="upload-result" class="test-result hidden"></div>
            </div>
        </div>
    </div>

    <!-- ── Confirm Modal ───────────────────────────────────────────────── -->
    <div id="confirm-overlay" class="modal-overlay hidden">
        <div class="modal modal-sm" role="dialog" aria-label="Confirm">
            <div class="modal-header"><h2 id="confirm-title">Confirm</h2></div>
            <div class="modal-body">
                <p id="confirm-message"></p>
                <div class="form-actions">
                    <button id="btn-confirm-cancel" class="btn btn-secondary">Cancel</button>
                    <button id="btn-confirm-ok" class="btn btn-primary">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Loading Overlay ─────────────────────────────────────────────── -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p id="loading-text">Processing...</p>
    </div>

    <!-- ── Toast Container ─────────────────────────────────────────────── -->
    <div id="toast-container"></div>

    <script src="/static/app.js?v=35"></script>
    <script src="/static/spreadsheet.js?v=35"></script>
    <script src="/static/navigation.js?v=35"></script>
</body>
</html>
